{{- if .Values.grafana.dashboards.enabled }}
---
# Grafana Dashboard ConfigMap
# 如果使用 Grafana Operator，設置正確的標籤即可自動發現
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-demo-dashboard
  namespace: {{ include "observability-demo.namespace" . }}
  labels:
    {{- include "observability-demo.labels" . | nindent 4 }}
    # Grafana Operator 自動發現標籤
    {{- range $key, $value := .Values.grafana.dashboards.dashboardLabelSelector }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
data:
  observability-demo-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (QPS)",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"$namespace\", job=~\"$job\"}[1m])) by (handler)",
              "legendFormat": "{{`{{handler}}`}}",
              "refId": "A"
            }
          ],
          "yaxes": [{"format": "reqps"}, {"format": "short"}]
        },
        {
          "title": "Error Rate",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"$namespace\", status=~\"5..\"}[5m])) by (handler) / sum(rate(http_requests_total{namespace=\"$namespace\"}[5m])) by (handler)",
              "legendFormat": "{{`{{handler}}`}}",
              "refId": "A"
            }
          ],
          "thresholds": [{"color": "red", "value": 0.05}],
          "yaxes": [{"format": "percentunit"}, {"format": "short"}]
        },
        {
          "title": "Request Latency (P50/P95/P99)",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"$namespace\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"$namespace\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"$namespace\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ],
          "yaxes": [{"format": "s"}, {"format": "short"}]
        },
        {
          "title": "Todo Items by Status",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "todo_items_by_status{namespace=\"$namespace\"}",
              "legendFormat": "{{`{{status}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "CRUD Operations Distribution",
          "type": "piechart",
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 8},
          "targets": [
            {
              "expr": "sum(rate(todo_operations_total{namespace=\"$namespace\"}[5m])) by (operation)",
              "legendFormat": "{{`{{operation}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Todo Items by Priority",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "todo_items_by_priority{namespace=\"$namespace\"}",
              "legendFormat": "{{`{{priority}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Service Status (UP/DOWN)",
          "type": "stat",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 16},
          "targets": [
            {
              "expr": "up{namespace=\"$namespace\"}",
              "legendFormat": "{{`{{job}}`}}",
              "refId": "A"
            }
          ],
          "thresholds": [
            {"color": "red", "value": 0},
            {"color": "green", "value": 1}
          ]
        },
        {
          "title": "Active Pods",
          "type": "stat",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 16},
          "targets": [
            {
              "expr": "count(up{namespace=\"$namespace\"} == 1)",
              "refId": "A"
            }
          ],
          "thresholds": [
            {"color": "red", "value": 0},
            {"color": "yellow", "value": 1},
            {"color": "green", "value": 2}
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 16,
      "style": "dark",
      "tags": ["observability", "demo", "crud"],
      "templating": {
        "list": [
          {
            "current": {"text": "observability-demo", "value": "observability-demo"},
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "query": "observability-demo",
            "type": "constant"
          },
          {
            "current": {"text": "All", "value": "$__all"},
            "datasource": "Prometheus",
            "hide": 0,
            "includeAll": true,
            "label": "Service",
            "multi": true,
            "name": "job",
            "query": "label_values(up{namespace=\"$namespace\"}, job)",
            "refresh": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {"refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h"]},
      "timezone": "",
      "title": "Observability Demo - Application Overview",
      "uid": "observability-demo-overview",
      "version": 1
    }
{{- end }}
