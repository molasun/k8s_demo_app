{{- if .Values.observability.prometheus.enabled }}
{{- if .Values.backend.enabled }}
---
# ServiceMonitor - 讓 Prometheus Operator 自動發現並採集後端指標
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ include "observability-demo.namespace" . }}
  annotations:
    # 強制 helm upgrade 時重新部署（避免舊配置殘留）
    helm.sh/resource-policy: keep
  labels:
    {{- include "observability-demo.labels" . | nindent 4 }}
    # OpenShift user-workload-monitoring 必要標籤
    openshift.io/user-monitoring: "true"
    {{- range $key, $value := .Values.observability.prometheus.serviceMonitorSelector }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  endpoints:
    - port: http
      interval: {{ .Values.observability.prometheus.scrapeInterval }}
      path: /metrics
      scheme: http
      honorLabels: true
  namespaceSelector:
    matchNames:
      - {{ include "observability-demo.namespace" . }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app: observability-demo
{{- end }}

{{- if .Values.frontend.enabled }}
---
# ServiceMonitor - 前端指標
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ include "observability-demo.namespace" . }}
  annotations:
    # 強制 helm upgrade 時重新部署
    helm.sh/resource-policy: keep
  labels:
    {{- include "observability-demo.labels" . | nindent 4 }}
    # OpenShift user-workload-monitoring 必要標籤
    openshift.io/user-monitoring: "true"
    {{- range $key, $value := .Values.observability.prometheus.serviceMonitorSelector }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  endpoints:
    - port: http
      interval: {{ .Values.observability.prometheus.scrapeInterval }}
      path: /metrics
      scheme: http
      honorLabels: true
  namespaceSelector:
    matchNames:
      - {{ include "observability-demo.namespace" . }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      app: observability-demo
{{- end }}
{{- end }}
