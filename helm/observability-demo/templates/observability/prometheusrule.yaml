{{- if .Values.observability.alertmanager.enabled }}
---
# PrometheusRule - 告警規則，由 Prometheus Operator 加載併發送到 AlertManager
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-demo-alerts
  namespace: {{ include "observability-demo.namespace" . }}
  labels:
    {{- include "observability-demo.labels" . | nindent 4 }}
    # 關鍵：此標籤必須匹配已有 Prometheus CR 的 ruleSelector
    {{- range $key, $value := .Values.observability.prometheus.ruleSelector }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  groups:
    - name: observability-demo.rules
      rules:
        # 1. 高錯誤率告警
        - alert: HighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{status=~"5..", job=~".*observability-demo.*"}[5m]))
              /
              sum(rate(http_requests_total{job=~".*observability-demo.*"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            app: observability-demo
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ "{{" }} $value | humanizePercentage {{ "}}" }} over the last 5 minutes in the observability-demo application."

        # 2. 高延遲告警 (P99 > 2s)
        - alert: HighLatency
          expr: |
            histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~".*observability-demo.*"}[5m])) by (le, handler)) > 2
          for: 5m
          labels:
            severity: warning
            app: observability-demo
          annotations:
            summary: "High latency detected"
            description: "P99 latency is {{ "{{" }} $value {{ "}}" }}s for handler {{ "{{" }} $labels.handler {{ "}}" }}. Threshold: 2s."

        # 3. 服務不可達
        - alert: BackendServiceDown
          expr: up{job=~".*backend.*observability-demo.*"} == 0
          for: 2m
          labels:
            severity: critical
            app: observability-demo
          annotations:
            summary: "Backend service is down"
            description: "The backend service has been down for more than 2 minutes."

        - alert: FrontendServiceDown
          expr: up{job=~".*frontend.*observability-demo.*"} == 0
          for: 2m
          labels:
            severity: critical
            app: observability-demo
          annotations:
            summary: "Frontend service is down"
            description: "The frontend service has been down for more than 2 minutes."

        # 4. Pod 頻繁重啓
        - alert: PodRestartFrequent
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace="{{ include "observability-demo.namespace" . }}"
            }[15m]) > 0.2
          for: 5m
          labels:
            severity: warning
            app: observability-demo
          annotations:
            summary: "Pod restarting frequently"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has restarted {{ "{{" }} $value {{ "}}" }} times in the last 15 minutes."

        # 5. CPU 使用率過高
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{
              namespace="{{ include "observability-demo.namespace" . }}",
              container!=""
            }[5m])) by (pod) > 0.8
          for: 10m
          labels:
            severity: warning
            app: observability-demo
          annotations:
            summary: "High CPU usage"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} CPU usage is {{ "{{" }} $value | humanizePercentage {{ "}}" }} over the last 10 minutes."

        # 6. 請求速率異常下降
        - alert: RequestRateDrop
          expr: |
            (
              rate(http_requests_total{job=~".*observability-demo.*"}[5m])
              /
              rate(http_requests_total{job=~".*observability-demo.*"}[30m]) offset 30m
            ) < 0.3
          for: 5m
          labels:
            severity: warning
            app: observability-demo
          annotations:
            summary: "Request rate dropped significantly"
            description: "Request rate dropped to {{ "{{" }} $value | humanizePercentage {{ "}}" }} of the rate 30 minutes ago."
{{- end }}
