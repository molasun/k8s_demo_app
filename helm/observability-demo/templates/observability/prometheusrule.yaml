{{- if .Values.observability.alertmanager.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-demo-alerts
  namespace: {{ include "observability-demo.namespace" . }}
  labels:
    {{- include "observability-demo.labels" . | nindent 4 }}
    # OpenShift user-workload-monitoring 必要標籤
    openshift.io/user-monitoring: "true"
    {{- range $key, $value := .Values.observability.prometheus.ruleSelector }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  groups:
    - name: observability-demo.rules
      rules:
        - alert: BackendServiceDown
          expr: absent(up{job=~".*backend.*observability-demo.*"}) == 1
          for: 2m
          labels:
            severity: critical
            app: observability-demo
          annotations:
            summary: "Backend service is down"
            description: "The backend service has been down for more than 2 minutes."

        - alert: FrontendServiceDown
          expr: absent(up{job=~".*frontend.*observability-demo.*"}) == 1
          for: 2m
          labels:
            severity: critical
            app: observability-demo
          annotations:
            summary: "Frontend service is down"
            description: "The frontend service has been down for more than 2 minutes."

        - alert: PodRestartFrequent
          expr: rate(kube_pod_container_status_restarts_total{namespace="{{ include "observability-demo.namespace" . }}"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
            app: observability-demo
          annotations:
            summary: "Pod restarting"
            description: "A pod in namespace {{ include "observability-demo.namespace" . }} is restarting."

        - alert: HighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="{{ include "observability-demo.namespace" . }}",container!=""}[5m])) by (pod) > 0.8
          for: 2m
          labels:
            severity: warning
            app: observability-demo
          annotations:
            summary: "High CPU usage"
            description: "A pod in namespace {{ include "observability-demo.namespace" . }} has CPU usage above 80%."
{{- end }}
